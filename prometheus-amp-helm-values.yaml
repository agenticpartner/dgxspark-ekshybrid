# RBAC permissions for service discovery
rbac:
  create: true

serviceAccounts:
  server:
    name: amp-iamproxy-ingest-service-account
    annotations: 
      eks.amazonaws.com/role-arn: arn:aws:iam::783764571332:role/amp-iamproxy-ingest-role

server:
  # Only node is GPU-tainted hybrid; without this, Prometheus stays Pending (0/1 schedulable).
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  # ClusterFirst is required so kubernetes.default.svc resolves (CoreDNS). dnsPolicy: Default
  # uses node DNS and breaks kubernetes_sd + API calls — wget "bad address kubernetes.default.svc".
  hostNetwork: false
  dnsPolicy: ClusterFirst
  # Hybrid pods could not reach kube-dns at 172.17.0.10:53 (timeouts). Put VPC DNS first
  # so sts.us-east-1.amazonaws.com / IRSA resolves; keep CoreDNS second for *.svc.cluster.local.
  # If your VPC is not 10.0.0.0/16, replace 10.0.0.2 with (VPC network base + 2), e.g. 172.31.0.2.
  dnsConfig:
    nameservers:
      - 10.0.0.2
      - 172.17.0.10
    searches:
      - prometheus.svc.cluster.local
      - svc.cluster.local
      - cluster.local
    options:
      - name: ndots
        value: "5"
  # Prometheus on the EKS VPC node cannot route to the hybrid pod CIDR (172.16.x),
  # so force scheduling onto the hybrid node where DCGM exporter runs.
  nodeSelector:
    kubernetes.io/hostname: mi-0954b0a583d23ac38
  persistentVolume:
    enabled: false
  remoteWrite:
    - url: https://aps-workspaces.us-east-1.amazonaws.com/workspaces/ws-cdb122f9-0327-4e29-bb52-2b13201289ea/api/v1/remote_write
      sigv4:
        region: us-east-1
      queue_config:
        max_samples_per_send: 1000
        max_shards: 200
        capacity: 2500
  global:
    scrape_interval: 30s
    external_labels:
      cluster: nvidiagpu

# Additional scrape configs for DCGM Exporter
serverFiles:
  prometheus.yml:
    scrape_configs:
      # DCGM Exporter - GPU metrics
      - job_name: 'dcgm-exporter'
        kubernetes_sd_configs:
          - role: endpoints                # Auto-discover Kubernetes endpoints
            namespaces:
              names:
                - gpu-operator             # Look in gpu-operator namespace
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            regex: nvidia-dcgm-exporter    # Match the DCGM exporter service
            action: keep
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node             # Add node label to metrics