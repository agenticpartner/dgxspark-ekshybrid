# Hybrid pods could not reach CoreDNS (ClusterIP), so the EKS API hostname never
# resolved and NFD worker hung until probes killed it. hostNetwork + node DNS fixes that.
node-feature-discovery:
  worker:
    hostNetwork: true
    dnsPolicy: Default
    extraEnvs:
      - name: KUBERNETES_SERVICE_HOST
        value: "2706FDCA0E3C9A87BD06E78572B22168.gr7.us-east-1.eks.amazonaws.com"
      - name: KUBERNETES_SERVICE_PORT
        value: "443"
    livenessProbe:
      initialDelaySeconds: 60
    readinessProbe:
      initialDelaySeconds: 30

# Hybrid pod network often cannot reach the Kubernetes Service VIP (172.17.0.1) or VPC API
# from 172.16.x without extra routing. Each validator *init* may ignore top-level validator.env,
# so set env per subsection. Use a private API ENI IP (see: nslookup <eks-endpoint-hostname>).
# After helm upgrade, re-apply hostNetwork on the validator DaemonSet (operator chart has no knob):
#   kubectl patch ds -n gpu-operator nvidia-operator-validator -p '{"spec":{"template":{"spec":{"hostNetwork":true,"dnsPolicy":"Default"}}}}'
validator:
  env:
    - name: KUBERNETES_SERVICE_HOST
      value: "10.0.10.184"
    - name: KUBERNETES_SERVICE_PORT
      value: "443"
  cuda:
    env:
      - name: KUBERNETES_SERVICE_HOST
        value: "10.0.10.184"
      - name: KUBERNETES_SERVICE_PORT
        value: "443"
  plugin:
    env:
      - name: KUBERNETES_SERVICE_HOST
        value: "10.0.10.184"
      - name: KUBERNETES_SERVICE_PORT
        value: "443"
  driver:
    env:
      - name: KUBERNETES_SERVICE_HOST
        value: "10.0.10.184"
      - name: KUBERNETES_SERVICE_PORT
        value: "443"
  toolkit:
    env:
      - name: KUBERNETES_SERVICE_HOST
        value: "10.0.10.184"
      - name: KUBERNETES_SERVICE_PORT
        value: "443"

# GPU Feature Discovery — must reach API + NodeFeature CRs; main container needs these env vars.
gfd:
  env:
    - name: KUBERNETES_SERVICE_HOST
      value: "10.0.10.184"
    - name: KUBERNETES_SERVICE_PORT
      value: "443"

# k8s-driver-manager init must PATCH node when host driver is pre-installed; env fixes VIP, but
# hybrid pod network still cannot dial the API ENI — re-apply hostNetwork after helm upgrade:
#   kubectl patch ds -n gpu-operator nvidia-driver-daemonset -p '{"spec":{"template":{"spec":{"hostNetwork":true,"dnsPolicy":"Default"}}}}'
driver:
  manager:
    env:
      - name: KUBERNETES_SERVICE_HOST
        value: "10.0.10.184"
      - name: KUBERNETES_SERVICE_PORT
        value: "443"
  env:
    - name: KUBERNETES_SERVICE_HOST
      value: "10.0.10.184"
    - name: KUBERNETES_SERVICE_PORT
      value: "443"
